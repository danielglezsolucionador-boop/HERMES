services:
  - type: web
    name: hermes-backend
    env: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: AI_PROVIDER
        value: openrouter
      - key: APP_ENV
        value: production
      - key: DEBUG
        value: false
      - key: APP_NAME
        value: hermes
      - key: APP_VERSION
        value: 0.1.0
      - key: LOG_LEVEL
        value: INFO